services:
  qdrant:
    image: qdrant/qdrant:v1.17
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage:z
    networks:
      - app-network

  backend:
    build:
      context: ./backend
    depends_on:
      - qdrant
    environment:
      - QDRANT_HOST=qdrant
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  qdrant_storage:
